services:
  - type: web
    name: foodhub-api
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONPATH
        value: "."
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        value: https://yummfoodhub.vercel.app,https://yummfoodhub.netlify.app,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENABLE_DEMO_DATA
        value: "false"
