services:
  - type: web
    name: bankmanagement-api
    env: python
    pythonVersion: 3.11
    region: oregon
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT --worker-class eventlet run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: run
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "*"
        sync: false

  - type: web
    name: bankmanagement-ui
    env: node
    nodeVersion: 18
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: REACT_APP_API_URL
        sync: false
