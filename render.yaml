      - key: CORS_ORIGINS
        value: https://yummfoodhub.vercel.app,http://localhost:3000,http://127.0.0.1:3000
      - key: SECRET_KEY
        value: u8u7f5jGwAr4qwmRx_bbVkF-hwji6hl9A2kcHxZG9Ng
      - key: JWT_SECRET_KEY
        value: _DfBiu07DONzbbN_dHh7iEeczozTn33tGsnLMGdNRNs
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENABLE_DEMO_DATA
        value: "true"
