name: foodhub_app
description: FoodHub - Food Delivery App (Web & Mobile)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0

  # State Management
  provider: ^6.0.0
  get: ^4.6.5

  # Storage
  shared_preferences: ^2.2.0

  # Navigation
  go_router: ^10.0.0

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

  # JWT & Security
  jwt_decoder: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Segoe UI
      fonts:
        - asset: assets/fonts/segoe-ui.ttf
