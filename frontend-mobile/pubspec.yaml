name: foodhub_app
description: FoodHub - Food Delivery App (Web & Mobile)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.1.0

  # State Management
  provider: ^6.0.0

  # Storage
  shared_preferences: ^2.2.0

  # Navigation
  go_router: ^10.0.0

  # Real-time communication (Socket.IO)
  socket_io_client: ^2.0.3

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Segoe UI
      fonts:
        - asset: assets/fonts/segoe-ui.ttf
