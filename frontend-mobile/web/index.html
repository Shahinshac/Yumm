<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FoodHub - Premium Fast Food Delivery App for users, restaurants, and partners.">
  <meta name="keywords" content="Food delivery, order online, restaurant food, Yumm, Flutter Web">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FoodHub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>🍕 FoodHub - Reliable & Fresh Food Delivery</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Sign-In Configuration -->
  <meta name="google-signin-client_id" content="946437330680-9r4mutghresee1heq36ailmtrh7drtv1.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY"></script>

  <style>
    body, html {
      background-color: #1a1a2e; /* Deep Charcoal App Theme */
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }
    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 75, 58, 0.2);
      border-top-color: #ff4b3a; /* Primary orange-red */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .splash-text {
      margin-top: 20px;
      color: #ffffff;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="splash-container" id="flutter-splash">
    <div class="loader"></div>
    <div class="splash-text">FoodHub</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Remove splash screen after an arbitrary time, since flutter_bootstrap will load WebGL canvas on top of this.
    // Or we leave it and it will naturally be hidden by the Flutter engine rendering its view over it.
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.style.display = 'none';
      }
    });
  </script>
</body>
</html>
